<section id="skills" class="section-container">
  <div class="section-header">
    <h2 class="section-title">Core <span>Skills</span> & Tech</h2>
    <div class="title-line"></div>
  </div>

  <div class="skills-wrapper">
    <!-- Core Skills Grid -->
    <div class="skills-grid">
      @for (skill of coreSkills; track skill.name; let i = $index) {
        <div class="skill-card glass-card" appScrollReveal [style.transition-delay]="i * 0.1 + 's'">
          <div class="skill-icon-wrapper">
            <svg viewBox="0 0 24 24" fill="none" class="skill-icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path [attr.d]="skill.icon"></path>
            </svg>
          </div>
          <h3 class="skill-name">{{ skill.name }}</h3>
        </div>
      }
    </div>

    <!-- Additional Tools / Architectures -->
    <div class="tools-container">
      <h3 class="tools-heading">Architecture & Tools</h3>
      <div class="tools-list">
        @for (tool of tools; track tool) {
          <span class="tool-badge">{{ tool }}</span>
        }
      </div>
    </div>
  </div>
</section>
